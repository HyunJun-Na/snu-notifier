name: SNU Notice Monitor

on:
  schedule:
    - cron: "50 22 * * *"   # 매일 KST 07:50 (UTC 22:50). 지연 감안 시 08시 전후 실행
  workflow_dispatch: {}       # 수동 실행 버튼

permissions:
  contents: write             # 상태 파일/설정 변경을 커밋하기 위해 필요

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit state & config changes
        run: |
          git config user.name "snu-notifier-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ config.yaml
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push
